name: Feature request
description: A new capability — an optimizer, a secret format, a guardrail rule, an agent integration.
title: "feat: "
labels: ["enhancement"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - guardrail / policy rule
        - secret redaction format
        - injection detection
        - output optimizer (new command)
        - agent integration / hooks
        - MCP scanning
        - CLI / UX
        - other
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the situation where Vallum currently falls short.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: What should Vallum do? For detection ideas, a defanged example input helps a lot.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you're using today, or other designs you thought about.
