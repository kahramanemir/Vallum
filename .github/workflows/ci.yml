name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cargo test --all
      - name: Test (bpe feature)
        run: cargo test --all --features bpe

  msrv:
    name: Minimum supported Rust (1.82)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.82.0
      # Check only lib + binary so the runtime MSRV is not held hostage to
      # dev-dependencies (criterion/proptest) that track a newer floor.
      - name: Check (no default features)
        run: cargo check --lib --bins
      - name: Check (bpe feature)
        run: cargo check --lib --bins --features bpe
